<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <meta name="description" content="Hell Let Loose Statistics and Game History" />
    <meta name="keywords" content="hell let loose, hll, crcon, stats, game history" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>Hell Let Loose Stats</title>
    <!-- When this app is embedded inside stats_app at /live/*, replace the
         war-scene <body> background with stats_app's zinc-950 BEFORE the
         body renders. Otherwise the war scene flashes for ~300ms while the
         JS bundle loads and React mounts the UnifiedHeader.
         Three layers of defense:
           1. add `embedded` class on <html> before <body> parses,
           2. CSS rule with !important to win over the inline body style,
           3. MutationObserver that strips the inline style attribute as
              soon as the body element appears — belt and suspenders in case
              the browser somehow paints from the inline style before the
              <style> rule kicks in (Chrome on slow first paint). -->
    <script>
      if (window.location.pathname.indexOf('/live') === 0) {
        document.documentElement.classList.add('embedded')
        new MutationObserver(function (_, obs) {
          if (document.body) {
            document.body.style.backgroundImage = 'none'
            document.body.style.backgroundColor = '#09090b'
            document.body.style.backgroundAttachment = 'initial'
            obs.disconnect()
          }
        }).observe(document.documentElement, { childList: true, subtree: true })
      }
    </script>
    <style>
      html.embedded body {
        background-image: none !important;
        background-color: #09090b !important;
        background-attachment: initial !important;
      }
    </style>
  </head>
  <body
    style="
      background-image: url('/background.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    "
  >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
