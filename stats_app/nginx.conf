# Run as root inside the container — standard for single-process containers.
# Debian python-slim base image doesn't create 'nginx' system user.
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Generate Location headers as path-only so the browser fills in
        # scheme/host/port from the current URL. Without this, nginx tried
        # to assemble an absolute URL using $host but dropped the :7012
        # docker port mapping → users got "http://95.111.230.75:live" /
        # "http://95.111.230.75/live" instead of "…:7012/live/".
        absolute_redirect off;
        server_name_in_redirect off;

        # Root → live current-match page. Editorial: the live game is the
        # most time-sensitive destination and now serves as the site's home.
        # The all-time leaderboard moved to /leaderboard. `=` modifier so
        # this only matches the bare root, not /<anything>.
        location = / {
            return 302 /live/;
        }

        # API → uvicorn on 127.0.0.1:8000 (same container)
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Playstyle endpoints can take ~5-10s on cold cache while
            # enriching 28k profiles. Default 30s was occasionally 502-ing.
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ---- Embedded rcongui_public (live game pages) ----------------------
        # rcongui_public is built a second time with base=/live/ inside this
        # image (see Dockerfile) so its assets and router live under /live/.
        # Its API calls go to /live/api/* which we rewrite and forward to the
        # CRCON Django backend reachable as `backend:8000` on the common
        # docker network.
        #
        # IMPORTANT: this `location /live/api/` block must come BEFORE the
        # `location /live/` static block so it wins on prefix match.

        location /live/api/ {
            # Use Docker's embedded DNS resolver (always at 127.0.0.11) and
            # put the upstream in a variable so nginx defers DNS lookup to
            # request time. With a literal `proxy_pass http://backend:8000`
            # nginx tries to resolve `backend` at config-load time, which
            # fails when stats_app starts before backend_1 is up and the
            # whole nginx process refuses to start.
            #
            # ORDER MATTERS: `set` is a rewrite-phase directive. `rewrite ...
            # break` halts the rewrite phase, so any `set` after it never
            # runs and the variable comes out uninitialized → 500. Declare
            # the variable BEFORE the rewrite.
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $live_backend "backend:8000";
            rewrite ^/live/api/(.*)$ /api/$1 break;
            proxy_pass http://$live_backend;
            # IMPORTANT: set Host explicitly to a value Django's ALLOWED_HOSTS
            # accepts.
            #
            # Two pitfalls solved here:
            #   1) Forwarding the browser's Host (e.g. 95.111.230.75:7012)
            #      → Django DisallowedHost → 400.
            #   2) When `proxy_pass` uses a variable (as we do above for
            #      deferred DNS), nginx populates Host from the resolved
            #      container hostname `backend_1:8000` — and Django rejects
            #      the underscore as RFC 1034/1035 invalid → 500.
            #
            # `localhost` is in every CRCON ALLOWED_HOSTS configuration and
            # has no underscore, so it works in both cases.
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # Static files for the embedded rcongui_public, plus SPA fallback
        # so deep links like /live/games/123/charts resolve to its index.html.
        location /live/ {
            try_files $uri $uri/ /live/index.html;
        }

        # rcongui_public's JSX hard-codes absolute paths like /maps/carentan.webp
        # and /icons/roles/infantry.png (see e.g. pages/games/columns.tsx).
        # Those are runtime strings so Vite's base=/live/ rewrite doesn't reach
        # them. Without these aliases the browser requests /maps/... at the
        # stats_app root and gets the SPA index.html → broken images.
        # No collision risk: stats_app has no resources under /maps or /icons.
        location /maps/ {
            alias /usr/share/nginx/html/live/maps/;
            access_log off;
            expires 7d;
        }
        location /icons/ {
            alias /usr/share/nginx/html/live/icons/;
            access_log off;
            expires 7d;
        }

        # SPA fallback for stats_app — React Router handles client-side routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
