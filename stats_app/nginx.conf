# Run as root inside the container — standard for single-process containers.
# Debian python-slim base image doesn't create 'nginx' system user.
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # API → uvicorn on 127.0.0.1:8000 (same container)
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Playstyle endpoints can take ~5-10s on cold cache while
            # enriching 28k profiles. Default 30s was occasionally 502-ing.
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # SPA fallback — React Router handles client-side routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
